<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Neon Snake Game</title>

  <!-- CSS Packages -->
  https://cdn.tailwindcss.comscript>
  https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Orbitron', sans-serif;
      color: #e5faff;
      background:
        radial-gradient(circle at top left, rgba(34, 211, 238, 0.25), transparent 35%),
        radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.25), transparent 35%),
        linear-gradient(135deg, #020617, #0f172a 45%, #111827);
      overflow-x: hidden;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: radial-gradient(circle, black 20%, transparent 75%);
      pointer-events: none;
      z-index: 0;
    }

    .glass {
      background: rgba(15, 23, 42, 0.65);
      border: 1px solid rgba(148, 163, 184, 0.25);
      box-shadow:
        0 0 40px rgba(34, 211, 238, 0.15),
        inset 0 0 25px rgba(255,255,255,0.03);
      backdrop-filter: blur(18px);
    }

    .neon-text {
      text-shadow:
        0 0 8px rgba(34, 211, 238, 0.9),
        0 0 22px rgba(168, 85, 247, 0.7);
    }

    .neon-border {
      box-shadow:
        0 0 14px rgba(34, 211, 238, 0.8),
        0 0 36px rgba(168, 85, 247, 0.35);
    }

    canvas {
      width: 100%;
      max-width: 620px;
      aspect-ratio: 1 / 1;
      background:
        radial-gradient(circle at center, rgba(15,23,42,0.9), rgba(2,6,23,1));
      border-radius: 28px;
      border: 2px solid rgba(34, 211, 238, 0.35);
      display: block;
    }

    .btn {
      transition: all 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 0 24px rgba(34, 211, 238, 0.5);
    }

    .pulse-dot {
      animation: pulseDot 1.5s infinite;
    }

    @keyframes pulseDot {
      0%, 100% {
        opacity: 0.4;
        transform: scale(0.95);
      }
      50% {
        opacity: 1;
        transform: scale(1.15);
      }
    }

    .floating {
      animation: float 5s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }
  </style>
</head>

<body>
  <div class="grid-bg"></div>

  <main class="relative z-10 min-h-screen flex items-center justify-center p-4">
    <section class="glass rounded-[32px] p-5 md:p-8 w-full max-w-6xl animate__animated animate__fadeIn">
      <div class="grid lg:grid-cols-[1fr_340px] gap-6 items-center">

        <!-- Game Area -->
        <div class="flex flex-col items-center gap-5">
          <div class="text-center">
            <h1 class="text-4xl md:text-6xl font-extrabold neon-text tracking-wider">
              NEON SNAKE
            </h1>
            <p class="text-cyan-200/70 mt-2 text-sm md:text-base">
              Advanced arcade snake with power-ups, obstacles and speed levels.
            </p>
          </div>

          <div class="relative neon-border rounded-[30px]">
            <canvas id="gameCanvas" width="600" height="600"></canvas>

            <div
              id="overlay"
              class="absolute inset-0 hidden items-center justify-center rounded-[28px] bg-slate-950/75 backdrop-blur-sm"
            >
              <div class="text-center p-6">
                <h2 id="overlayTitle" class="text-4xl font-bold neon-text mb-3">GAME OVER</h2>
                <p id="overlayText" class="text-cyan-100/80 mb-5">Press Restart to play again.</p>
                <button
                  onclick="restartGame()"
                  class="btn px-6 py-3 rounded-2xl bg-cyan-400 text-slate-950 font-bold"
                >
                  Restart Game
                </button>
              </div>
            </div>
          </div>

          <div class="text-xs md:text-sm text-slate-300/75 text-center">
            Controls: Arrow Keys / WASD. Press Space to pause.
          </div>
        </div>

        <!-- Sidebar -->
        <aside class="glass rounded-[28px] p-5 floating">
          <div class="flex items-center gap-3 mb-6">
            <span class="w-3 h-3 bg-emerald-400 rounded-full pulse-dot"></span>
            <h2 class="text-xl font-bold text-cyan-200">Command Panel</h2>
          </div>

          <div class="grid
