<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classic Tetris</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #111;
      color: #fff;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .game-wrapper {
      display: flex;
      gap: 24px;
      padding: 20px;
      border: 4px solid #fff;
      background: #000;
    }

    .game-panel {
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      letter-spacing: 4px;
      font-weight: bold;
      color: #fff;
    }

    canvas {
      background: #000;
      border: 3px solid #fff;
      display: block;
    }

    .sidebar {
      width: 180px;
      border: 3px solid #fff;
      padding: 14px;
      background: #000;
    }

    .box {
      border: 2px solid #fff;
      padding: 10px;
      margin-bottom: 14px;
    }

    .label {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .value {
      font-size: 24px;
      color: #fff;
      font-weight: bold;
    }

    .controls {
      font-size: 12px;
      line-height: 1.8;
      color: #ddd;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #fff;
      color: #000;
      border: none;
      font-family: "Courier New", monospace;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }

    button:hover {
      background: #ccc;
    }

    .game-over {
      color: #fff;
      font-size: 14px;
      margin-top: 10px;
      min-height: 20px;
    }
  </style>
</head>

<body>
  <div class="game-wrapper">
    <div class="game-panel">
      <h1>TETRIS</h1>
      <canvas id="game" width="240" height="400"></canvas>
      <div id="message" class="game-over"></div>
    </div>

    <div class="sidebar">
      <div class="box">
        <div class="label">Score</div>
        <div id="score" class="value">0</div>
      </div>

      <div class="box">
        <div class="label">Lines</div>
        <div id="lines" class="value">0</div>
      </div>

      <div class="box">
        <div class="label">Level</div>
        <div id="level" class="value">1</div>
      </div>

      <div class="box">
        <div class="label">Controls</div>
        <div class="controls">
          ← Move Left<br>
          → Move Right<br>
          ↓ Soft Drop<br>
          ↑ Rotate<br>
          Space Drop<br>
          P Pause
        </div>
      </div>

      <button onclick="restartGame()">Restart</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const linesEl = document.getElementById("lines");
    const levelEl = document.getElementById("level");
    const messageEl = document.getElementById("message");

    const blockSize = 20;
    const cols = canvas.width / blockSize;
    const rows = canvas.height / blockSize;

    const arena = createMatrix(cols, rows);

    let score = 0;
    let lines = 0;
    let level = 1;
    let dropCounter = 0;
    let dropInterval = 800;
    let lastTime = 0;
    let paused = false;
    let gameOver = false;

    const player = {
      pos: { x: 0, y: 0 },
      matrix: null
    };

    const colors = [
      null,
      "#ffffff",
      "#dddddd",
      "#bbbbbb",
      "#999999",
      "#777777",
      "#555555",
      "#333333"
    ];

    function createMatrix(w, h) {
      const matrix = [];
      while (h--) {
        matrix.push(new Array(w).fill(0));
      }
      return matrix;
    }

    function createPiece(type) {
      if (type === "T") {
        return [
          [0, 1, 0],
          [1, 1, 1],
          [0, 0, 0]
        ];
      }

      if (type === "O") {
        return [
          [2, 2],
          [2, 2]
        ];
      }

      if (type === "L") {
        return [
          [0, 0, 3],
          [3, 3, 3],
          [0, 0, 0]
        ];
      }

      if (type === "J") {
        return [
          [4, 0, 0],
          [4, 4, 4],
          [0, 0, 0]
        ];
      }

      if (type === "I") {
        return [
          [0, 0, 0, 0],
          [5, 5, 5, 5],
          [0, 0, 0, 0],
          [0, 0, 0, 0]
        ];
      }

      if (type === "S") {
        return [
          [0, 6, 6],
          [6, 6, 0],
          [0, 0, 0]
        ];
      }

      if (type === "Z") {
        return [
          [7, 7, 0],
          [0, 7, 7],
          [0, 0, 0]
        ];
      }
    }

    function drawBlock(x, y, value) {
      ctx.fillStyle = colors[value];
      ctx.fillRect(x * blockSize, y * blockSize, blockSize, blockSize);

      ctx.strokeStyle = "#000";
      ctx.lineWidth = 2;
      ctx.strokeRect(x * blockSize, y * blockSize, blockSize, blockSize);

      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 1;
      ctx.strokeRect(
        x * blockSize + 1,
        y * blockSize + 1,
        blockSize - 2,
        blockSize - 2
      );
    }

    function drawMatrix(matrix, offset) {
      matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            drawBlock(x + offset.x, y + offset.y, value);
          }
        });
      });
    }

    function drawGrid() {
      ctx.strokeStyle = "#222";
      ctx.lineWidth = 1;

      for (let x = 0; x <= cols; x++) {
        ctx.beginPath();
        ctx.moveTo(x * blockSize, 0);
        ctx.lineTo(x * blockSize, canvas.height);
        ctx.stroke();
      }

      for (let y = 0; y <= rows; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * blockSize);
        ctx.lineTo(canvas.width, y * blockSize);
        ctx.stroke();
      }
    }

    function draw() {
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawGrid();
      drawMatrix(arena, { x: 0, y: 0 });
      drawMatrix(player.matrix, player.pos);
    }

    function collide(arena, player) {
      const matrix = player.matrix;
      const offset = player.pos;

      for (let y = 0; y < matrix.length; y++) {
        for (let x = 0; x < matrix[y].length; x++) {
          if (
            matrix[y][x] !== 0 &&
            (
              arena[y + offset.y] &&
              arena[y + offset.y][x + offset.x]
            ) !== 0
          ) {
            return true;
          }
        }
      }

      return false;
    }

    function merge(arena, player) {
      player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            arena[y + player.pos.y][x + player.pos.x] = value;
          }
        });
      });
    }

    function playerDrop() {
      player.pos.y++;

      if (collide(arena, player)) {
        player.pos.y--;
        merge(arena, player);
        arenaSweep();
        playerReset();
      }

      dropCounter = 0;
    }

    function hardDrop() {
      while (!collide(arena, player)) {
        player.pos.y++;
      }

      player.pos.y--;
      merge(arena, player);
      arenaSweep();
      playerReset();
      dropCounter = 0;
    }

    function playerMove(dir) {
      player.pos.x += dir;

      if (collide(arena, player)) {
        player.pos.x -= dir;
      }
    }

    function playerReset() {
      const pieces = "TJLOSZI";
      const randomPiece = pieces[Math.floor(Math.random() * pieces.length)];

      player.matrix = createPiece(randomPiece);
      player.pos.y = 0;
      player.pos.x =
        Math.floor(cols / 2) - Math.floor(player.matrix[0].length / 2);

      if (collide(arena, player)) {
        gameOver = true;
        messageEl.textContent = "GAME OVER";
      }
    }

    function rotate(matrix) {
      for (let y = 0; y < matrix.length; y++) {
        for (let x = 0; x < y; x++) {
          [
            matrix[x][y],
            matrix[y][x]
          ] = [
            matrix[y][x],
            matrix[x][y]
          ];
        }
      }

      matrix.forEach(row => row.reverse());
    }

    function playerRotate() {
      const oldX = player.pos.x;
      let offset = 1;

      rotate(player.matrix);

      while (collide(arena, player)) {
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));

        if (offset > player.matrix[0].length) {
          rotateBack(player.matrix);
          player.pos.x = oldX;
          return;
        }
      }
    }

    function rotateBack(matrix) {
      matrix.forEach(row => row.reverse());

      for (let y = 0; y < matrix.length; y++) {
        for (let x = 0; x < y; x++) {
          [
            matrix[x][y],
            matrix[y][x]
          ] = [
            matrix[y][x],
            matrix[x][y]
          ];
        }
      }
    }

    function arenaSweep() {
      let rowCount = 1;

      outer: for (let y = arena.length - 1; y >= 0; y--) {
        for (let x = 0; x < arena[y].length; x++) {
          if (arena[y][x] === 0) {
            continue outer;
          }
        }

        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        y++;

        lines++;
        score += rowCount * 100;
        rowCount *= 2;
      }

      level = Math.floor(lines / 10) + 1;
      dropInterval = Math.max(100, 800 - (level - 1) * 70);

      updateUI();
    }

    function updateUI() {
      scoreEl.textContent = score;
      linesEl.textContent = lines;
      levelEl.textContent = level;
    }

    function restartGame() {
      arena.forEach(row => row.fill(0));

      score = 0;
      lines = 0;
      level = 1;
      dropInterval = 800;
      dropCounter = 0;
      lastTime = 0;
      paused = false;
      gameOver = false;

      messageEl.textContent = "";
      updateUI();
      playerReset();
    }

    function update(time = 0) {
      const deltaTime = time - lastTime;
      lastTime = time;

      if (!paused && !gameOver) {
        dropCounter += deltaTime;

        if (dropCounter > dropInterval) {
          playerDrop();
        }

        draw();
      }

      requestAnimationFrame(update);
    }

    document.addEventListener("keydown", event => {
      if (gameOver) return;

      if (event.key === "ArrowLeft") {
        playerMove(-1);
      } else if (event.key === "ArrowRight") {
        playerMove(1);
      } else if (event.key === "ArrowDown") {
        playerDrop();
      } else if (event.key === "ArrowUp") {
        playerRotate();
      } else if (event.code === "Space") {
        hardDrop();
      } else if (event.key.toLowerCase() === "p") {
        paused = !paused;
        messageEl.textContent = paused ? "PAUSED" : "";
      }
    });

    playerReset();
    updateUI();
    update();
  </script>
</body>
</html>
