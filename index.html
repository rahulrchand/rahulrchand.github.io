<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Construction</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: black;
        overflow: hidden;
        color: white;
    }

    /* Animated gradient background */
    body::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle at center, #00f0ff, #000, #ff00c8);
        animation: moveBackground 12s linear infinite;
        z-index: -2;
        opacity: 0.15;
    }

    @keyframes moveBackground {
        0% { transform: translate(-25%, -25%) rotate(0deg); }
        50% { transform: translate(-30%, -20%) rotate(180deg); }
        100% { transform: translate(-25%, -25%) rotate(360deg); }
    }

    /* Grid overlay */
    .grid {
        position: absolute;
        width: 100%;
        height: 100%;
        background: linear-gradient(#00f0ff22 1px, transparent 1px),
                    linear-gradient(90deg, #00f0ff22 1px, transparent 1px);
        background-size: 40px 40px;
        animation: gridMove 10s linear infinite;
    }

    @keyframes gridMove {
        from {
            transform: translateY(0);
        }
        to {
            transform: translateY(40px);
        }
    }

    /* Glowing text container */
    .container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
    }

    h1 {
        font-size: 3rem;
        text-transform: uppercase;
        letter-spacing: 4px;
        color: #00f0ff;
        animation: glitch 2s infinite;
        text-shadow: 
            0 0 10px #00f0ff,
            0 0 20px #00f0ff,
            0 0 40px #00f0ff,
            0 0 80px #00f0ff;
    }

    /* Glitch effect */
    @keyframes glitch {
        0% { transform: translate(0); }
        20% { transform: translate(-2px, 2px); }
        40% { transform: translate(-2px, -2px); }
        60% { transform: translate(2px, 2px); }
        80% { transform: translate(2px, -2px); }
        100% { transform: translate(0); }
    }

    /* Floating particles */
    canvas {
        position: absolute;
        top: 0;
        left: 0;
    }

</style>
</head>
<body>

<div class="grid"></div>

<canvas id="particles"></canvas>

<div class="container">
    <h1>Website Under Construction</h1>
</div>

<script>
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];

class Particle {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2;
        this.speedX = (Math.random() - 0.5);
        this.speedY = (Math.random() - 0.5);
    }

    update() {
        this.x += this.speedX;
        this.y += this.speedY;

        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
    }

    draw() {
        ctx.fillStyle = '#00f0ff';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function init() {
    particlesArray = [];
    for (let i = 0; i < 120; i++) {
        particlesArray.push(new Particle());
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particlesArray.forEach(p => {
        p.update();
        p.draw();
    });
    requestAnimationFrame(animate);
}

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    init();
});

init();
animate();
</script>

</body>
</html>
