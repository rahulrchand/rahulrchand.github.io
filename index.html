<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confidential</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    background:#000;
    overflow:hidden;
    font-family:monospace;
}

/* HOLOGRAM TEXT */
.title {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:clamp(2.5rem,4vw,3.2rem);
    letter-spacing:4px;
    color:#e6faff;
    text-align:center;
    pointer-events:none;

    text-shadow:
        0 0 10px rgba(0,255,255,0.3),
        0 0 30px rgba(0,255,255,0.2);
}

canvas {
    position:fixed;
    top:0;
    left:0;
}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="title">Website Under Construction</div>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* ---------------- MATRIX ---------------- */

const chars = "010101ABCDEF012345";
let drops = [];
const size = 16;

function initMatrix(){
    let cols = Math.floor(canvas.width / size);
    drops = Array(cols).fill(0).map(()=>Math.random()*canvas.height);
}
initMatrix();

function drawMatrix(){
    ctx.font = size + "px monospace";

    for(let i=0;i<drops.length;i++){
        let x = i * size;
        let y = drops[i];
        let text = chars[Math.floor(Math.random()*chars.length)];

        ctx.fillStyle = "rgba(0,255,200,0.25)";
        ctx.fillText(text,x,y);

        ctx.fillStyle = "rgba(0,255,200,0.06)";
        ctx.fillText(text,x,y-10);

        drops[i] += size * 0.8;

        if(drops[i] > canvas.height){
            drops[i] = Math.random()*-100;
        }
    }
}

/* ---------------- INTERACTIVE NODES ---------------- */

let mouse = {x:canvas.width/2,y:canvas.height/2};

window.addEventListener("mousemove",e=>{
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

/* click = activate */
window.addEventListener("click", ()=>{
    nodes.forEach(n=>{
        let dx = mouse.x - n.x;
        let dy = mouse.y - n.y;
        let d = Math.hypot(dx,dy);

        if(d < 120){
            n.active = 1;
        }
    });
});

/* nodes */
let nodes = [];

for(let i=0;i<120;i++){
    nodes.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        vx:(Math.random()-0.5)*0.3,
        vy:(Math.random()-0.5)*0.3,
        active:0
    });
}

function updateNodes(){
    nodes.forEach(n=>{
        n.x += n.vx;
        n.y += n.vy;

        if(n.x<0||n.x>canvas.width)n.vx*=-1;
        if(n.y<0||n.y>canvas.height)n.vy*=-1;

        /* hover attraction */
        let dx = mouse.x - n.x;
        let dy = mouse.y - n.y;
        let dist = Math.hypot(dx,dy);

        if(dist < 140){
            n.x += dx * 0.01;
            n.y += dy * 0.01;
        }

        /* fade activation */
        if(n.active > 0){
            n.active -= 0.01;
        }
    });
}

function drawNodes(){
    nodes.forEach(n=>{
        ctx.beginPath();
        ctx.arc(n.x,n.y,n.active?3:1.5,0,Math.PI*2);

        ctx.fillStyle = n.active
            ? "rgba(0,255,255,"+n.active+")"
            : "rgba(255,255,255,0.3)";

        ctx.fill();
    });
}

/* connections */
function drawConnections(){
    for(let i=0;i<nodes.length;i++){
        for(let j=i+1;j<nodes.length;j++){

            let dx = nodes[i].x - nodes[j].x;
            let dy = nodes[i].y - nodes[j].y;
            let d = Math.hypot(dx,dy);

            if(d < 100){
                let strength = 1 - d/100;

                let intensity = Math.max(
                    nodes[i].active,
                    nodes[j].active
                );

                ctx.strokeStyle = intensity > 0
                    ? `rgba(0,255,255,${strength * intensity})`
                    : `rgba(255,255,255,${strength * 0.1})`;

                ctx.lineWidth = 0.6;

                ctx.beginPath();
                ctx.moveTo(nodes[i].x,nodes[i].y);
                ctx.lineTo(nodes[j].x,nodes[j].y);
                ctx.stroke();
            }
        }
    }
}

/* ---------------- LOOP ---------------- */

function animate(){

    /* soft fade (important) */
    ctx.fillStyle = "rgba(0,0,0,0.1)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    drawMatrix();        // background
    updateNodes();
    drawNodes();
    drawConnections();

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
