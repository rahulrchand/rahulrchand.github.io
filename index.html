<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Site Under Maintenance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      max-width: 400px;
      width: 90%;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 20px;
    }

    .loader {
      display: flex;
      justify-content: center;
      margin: 20px 0;
    }

    .loader span {
      width: 12px;
      height: 12px;
      margin: 5px;
      border-radius: 50%;
      background: #fff;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .loader span:nth-child(1) { animation-delay: -0.32s; }
    .loader span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    #countdown {
      font-size: 1.4rem;
      font-weight: bold;
      margin-top: 10px;
      letter-spacing: 1px;
    }

    .footer {
      margin-top: 20px;
      font-size: 0.8rem;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>We’ll Be Back</h1>
    <p>Our website is currently under maintenance.<br>We’re working to improve your experience.</p>

    <div class="loader">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div id="countdown">Loading...</div>

    <div class="footer">
      © 2026 Your Company
    </div>
  </div>

  <script>
    // Set countdown (e.g., 4 hours from now)
    const targetDate = new Date();
    targetDate.setHours(targetDate.getHours() + 4);

    function updateCountdown() {
      const now = new Date();
      const diff = targetDate - now;

      if (diff <= 0) {
        document.getElementById("countdown").innerHTML = "✅ We're Live!";
        return;
      }

      const hours = Math.floor(diff / (1000 * 60 * 60));
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("countdown").innerHTML =
        `${hours}h ${minutes}m ${seconds}s`;
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>

</body>
</html>
